name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.1)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack plugin zip
        run: |
          # 把暂存目录建在工作区外,彻底避免 rsync 把它自己拷进去
          STAGE="$RUNNER_TEMP/skyblock"
          mkdir -p "$STAGE"

          rsync -a \
            --exclude='docs' \
            --exclude='.github' \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            --exclude='runtime/*.json' \
            --exclude='runtime/data/' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.bak' \
            --exclude='*.log' \
            ./ "$STAGE/"

          mkdir -p dist
          ( cd "$RUNNER_TEMP" && zip -r "$GITHUB_WORKSPACE/dist/skyblock-${{ steps.tag.outputs.name }}.zip" skyblock )

          echo "--- 打包内容预览(顶层) ---"
          unzip -l "dist/skyblock-${{ steps.tag.outputs.name }}.zip" | head -20

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: dist/skyblock-*.zip
